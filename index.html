<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBH Build Share — Task Bar Hero Build Planner</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="https://www.taskbarhero.wiki/favicon.png">
  <meta name="description" content="Plan, share, and browse builds for TBH: Task Bar Hero. Community build planner with skill trees and runes.">
</head>
<body>

  <!-- ─── Header ─────────────────────────────────────────── -->
  <header class="header">
    <div class="header-logo">
      <img src="https://www.taskbarhero.wiki/favicon.png" alt="TBH">
      <span>TBH Build Share</span>
    </div>
    <nav class="header-nav" id="header-nav">
      <a href="index.html" class="active">Planner</a>
      <a href="browse.html">Browse</a>
      <a href="https://www.taskbarhero.wiki/" target="_blank" rel="noopener">Wiki ↗</a>
      <a href="https://store.steampowered.com/app/3678970" target="_blank" rel="noopener">Steam ↗</a>
    </nav>
  </header>

  <!-- ─── Container ───────────────────────────────────────── -->
  <main class="container">

    <!-- TAB BAR -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="skills">Skill Planner</button>
      <button class="tab-btn" data-tab="runes">Rune Tree</button>
      <button class="tab-btn" data-tab="market">Market</button>
    </div>

    <!-- TAB: SKILL PLANNER -->
    <div id="tab-skills" class="tab-content active">

      <!-- Hero Selector -->
      <h2 style="font-size:16px;font-weight:600;margin-bottom:10px;color:var(--text-secondary)">
        Choose Your Hero
      </h2>
      <div class="hero-selector" id="hero-selector"></div>

      <!-- Build Info -->
      <div class="build-info">
        <label for="build-name">Build Name</label>
        <input type="text" id="build-name" placeholder="My Awesome Build" maxlength="60">
        <div class="level-control">
          <div class="level-header">
            <label for="hero-level">Level</label>
            <strong id="level-display" class="level-number">100</strong>
          </div>
          <div class="slider-wrap">
            <input type="range" id="hero-level" min="1" max="100" value="100">
            <output class="slider-val" for="hero-level">100</output>
          </div>
        </div>
      </div>

      <!-- Main Panels -->
      <div class="panel-grid">
        <!-- Skill Tree -->
        <div class="panel">
          <h3>Skill Tree</h3>
          <div id="skill-tree"></div>
        </div>

        <!-- Active Skills -->
        <div>
          <div class="panel" style="margin-bottom:16px">
            <h3>Active Skills</h3>
            <div id="active-skills"></div>
          </div>
          <div class="panel" style="margin-bottom:16px">
            <h3>Selected Passives</h3>
            <div id="passive-skills"></div>
          </div>
        </div>
      </div>

      <!-- Build Stats -->
      <div class="panel" style="margin-bottom:16px">
        <h3>Base Stats (Lv.1, no gear)</h3>
        <div class="build-stats" id="build-stats"></div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary" data-action="save-build">💾 Save Build</button>
        <button class="btn btn-success" data-action="share-build">🔗 Share Link</button>
        <button class="btn btn-warning" data-action="export-build">📥 Export</button>
        <button class="btn btn-outline" data-action="import-build">📤 Import</button>
      </div>

      <!-- Saved Builds -->
      <h2 style="font-size:16px;font-weight:600;margin:24px 0 10px;color:var(--text-secondary)">
        Saved Builds
      </h2>
      <div id="saved-builds"></div>

    </div>

    <!-- TAB: RUNE TREE -->
    <div id="tab-runes" class="tab-content">
      <div class="rune-tree-header">
        <h3>Rune Tree</h3>
        <div class="rune-tree-actions">
          <span class="rune-total-gold" id="rune-total-gold">Total: 0 Gold</span>
          <button class="btn btn-sm btn-primary" id="rune-share">🔗 Share Runes</button>
          <button class="btn btn-sm btn-outline" id="rune-reset">Reset All</button>
        </div>
      </div>
      <div class="rune-layout">
        <div class="rune-tree-container" id="rune-tree-container">
          <div id="rune-container"></div>
          <div id="rune-tooltip" class="rune-tooltip"></div>
        </div>
        <div id="rune-legend" class="rune-legend">
          <div id="rune-info" class="rune-info" style="display:none">
            <div class="rune-info-icon">
              <img id="rune-info-img" src="" alt="" width="40" height="40">
            </div>
            <div class="rune-info-body">
              <div id="rune-info-name" class="rune-info-name"></div>
              <div id="rune-info-stat" class="rune-info-stat"></div>
              <div id="rune-info-aliases" class="rune-info-aliases"></div>
            </div>
          </div>
          <div id="rune-info-empty" class="rune-info rune-info-empty">
            <div class="rune-info-empty-text">Click a rune to see details</div>
          </div>
          <h3 class="rune-legend-title">Rune Index <span class="rune-legend-count"></span></h3>
          <div id="rune-legend-grid" class="rune-legend-grid"></div>
        </div>
      </div>
    </div>

    <!-- TAB: MARKET -->
    <div id="tab-market" class="tab-content"></div>

  </main>

  <!-- ─── Scripts ─────────────────────────────────────────── -->
  <script src="data.js?v=2"></script>
  <script src="rune-tree.js?v=2"></script>
  <script src="market.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
